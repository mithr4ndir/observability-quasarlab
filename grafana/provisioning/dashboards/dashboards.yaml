apiVersion: 1

providers:
  - name: Kubernetes
    orgId: 1
    folder: Kubernetes
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    options:
      path: /var/lib/grafana/dashboards/kubernetes
      foldersFromFilesStructure: false

  - name: Proxmox
    orgId: 1
    folder: Proxmox
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    options:
      path: /var/lib/grafana/dashboards/proxmox
      foldersFromFilesStructure: false

  - name: VMs
    orgId: 1
    folder: VMs
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    options:
      path: /var/lib/grafana/dashboards/vms
      foldersFromFilesStructure: false
